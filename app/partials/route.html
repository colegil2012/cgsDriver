<div class="page-content route-page">

    <!--
      Status bar across the top — thin, full width. Always visible on this
      page; contents depend on whether there's an active route.

      When no active route:
        #route-status-info  hidden
        #route-status-empty visible (label + Plan Route button)

      When active route:
        #route-status-info  visible (number, status pill, summary)
        #route-status-empty hidden
        #route-status-actions contains contextual buttons:
          PLANNED      -> Start Route + Cancel
          IN_PROGRESS  -> Complete Route + Cancel
          COMPLETED    -> Plan Another Route
          CANCELLED    -> Plan Another Route
    -->
    <div class="route-status-bar">
        <div id="route-status-info" class="route-status-info" hidden>
            <span id="route-status-number" class="route-status-number"></span>
            <span id="route-status-pill" class="route-status-pill"></span>
            <span id="route-status-summary" class="route-status-summary"></span>
        </div>

        <div id="route-status-empty" class="route-status-empty" hidden>
            <span class="route-status-empty-text">No active route</span>
            <button class="btn-primary" type="button" data-page="orders">Plan Route</button>
        </div>

        <div id="route-status-actions" class="route-status-actions"></div>
    </div>

    <!--
      Map stage. Fills all remaining vertical space below the status bar.
      .route-map-stage is the positioning context for the next-stop overlay.
    -->
    <div class="route-map-stage">
        <div id="route-map-wrapper" class="map-container">
            <div id="map"></div>
            <div id="map-overlay">
                <div class="map-status" id="map-status">Locating...</div>
            </div>
        </div>

        <!--
          Bottom-left next-stop overlay. Hidden when:
            - no active route
            - route is not IN_PROGRESS (no Mark Delivered until started)
            - every stop has reached a terminal state (DELIVERED/FAILED/SKIPPED)

          Two views inside:
            .next-stop-collapsed  default — minimal: sequence + customer + Mark btn
            .next-stop-expanded   after tap — adds phone, full address, instructions
        -->
        <div id="next-stop-overlay" class="next-stop-overlay" hidden>
            <button class="next-stop-toggle" type="button"
                    data-stop-action="toggle-expand"
                    aria-label="Toggle stop details">
                <div class="next-stop-header">
                    <span id="next-stop-seq" class="next-stop-seq"></span>
                    <div class="next-stop-customer">
                        <div id="next-stop-customer-name" class="next-stop-customer-name"></div>
                        <div id="next-stop-address-short" class="next-stop-address-short"></div>
                    </div>
                    <span class="next-stop-chevron" aria-hidden="true">▾</span>
                </div>

                <div id="next-stop-details" class="next-stop-details" hidden>
                    <div id="next-stop-phone" class="next-stop-phone"></div>
                    <div id="next-stop-address-full" class="next-stop-address-full"></div>
                    <div id="next-stop-instructions" class="next-stop-instructions" hidden></div>
                </div>
            </button>

            <button class="btn-primary next-stop-mark-btn" type="button"
                    data-stop-action="mark-delivered"
                    id="next-stop-mark-btn">
                Mark Delivered
            </button>
        </div>
    </div>

</div>
