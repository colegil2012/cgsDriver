<div class="page-content route-page">

    <!--
      Empty state — shown by applyRouteToView when GET /routes/active
      returns null. Sits outside the two-column grid so it spans the
      full page width when present (cleaner than splitting it across
      .route-main + .route-stops).
    -->
    <div id="route-empty" class="route-empty" hidden>
        <h2>No active route</h2>
        <p>Plan a route from the Orders tab to get started.</p>
        <button class="route-empty-cta" type="button" data-page="orders">
            Go to Orders
        </button>
    </div>

    <!--
      Two-column grid (hidden when the empty state is shown):
        .route-main   — header + map + cancel-confirm
        .route-stops-panel — sequenced stops list with Mark Delivered actions
    -->
    <div id="route-grid" class="route-grid" hidden>

        <div class="route-main">

            <!-- Header bar — populated by applyRouteToView -->
            <div id="route-header" class="route-header">
                <div class="route-header-info">
                    <span id="route-header-number" class="route-header-number"></span>
                    <span id="route-header-status" class="route-header-status"></span>
                    <span id="route-header-summary" class="route-header-summary"></span>
                </div>
                <div id="route-header-actions" class="route-header-actions"></div>
            </div>

            <!--
              Map. Always present in the DOM so celtechInitMap() / queued
              celtechSetRoute have a target. Hidden via inline display:none
              when the route is COMPLETED or CANCELLED.
            -->
            <div id="route-map-wrapper" class="map-container">
                <div id="map"></div>
                <div id="map-overlay">
                    <div class="map-status" id="map-status">Locating...</div>
                </div>
            </div>

            <!--
              Inline cancel-confirm panel — hidden by default. The hidden
              attribute is enforced via the [hidden] rule near the top of
              style.css so a class-level `display: flex` can't override it.
            -->
            <div id="route-confirm-cancel" class="route-confirm" hidden>
                <div class="route-confirm-text">
                    <strong>Cancel this route?</strong>
                    <p>All deliveries on this route will be released back to PENDING and become available to add to a new route. This can't be undone.</p>
                </div>
                <div class="route-confirm-actions">
                    <button id="route-confirm-cancel-no" class="btn-secondary" type="button">Keep Route</button>
                    <button id="route-confirm-cancel-yes" class="btn-danger" type="button">Cancel Route</button>
                </div>
            </div>

        </div><!-- /.route-main -->

        <!--
          Right-side stops panel. Stops are listed in `sequence` order with
          their Mark Delivered buttons. Rendered by applyRouteToView from
          the active route's stop list.

          Sticky positioning keeps the list visible as the left column
          (mostly the map) sits in place — internal scroll handles a long
          stop list.
        -->
        <aside class="route-stops-panel">
            <h2 class="route-stops-panel-title">Deliveries</h2>
            <p class="route-stops-panel-subtitle">In delivery order</p>
            <div id="route-stops" class="route-stops"></div>
        </aside>

    </div><!-- /#route-grid -->

</div>
